<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/jpeg" href="logo.webp">
  <title>Roomora | Flight + Hotel Booking</title>
  <link rel="stylesheet" href="journey.css" />
</head>

<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">Roomora<span>.com</span></div>
    <nav class="menu">
      <a href="hotel.html">Hotel</a>
        <a href="resort.html">Resort</a>
        <a href="guest.html">Guest House</a>
        <a href="flights.html">Flights</a>
        <!--<a href="journey.html">Flight + Hotel</a>-->
        <a href="vehicle.html">Vehicles</a>
        <a href="places.html">Famous Places</a>
    </nav>
    <div class="auth-buttons">
      <a href="register.html" class="btn-auth">Register</a>
      <a href="login.html" class="btn-auth">Login</a>
    </div>
  </header>

  <!-- Booking Section -->
  <section class="booking-section">
    <h2>Book Flight + Hotel</h2>
    <form class="booking-form" id="flightHotelForm">
      <!-- Flight Search -->
      <div class="form-group">
        <label for="from">From</label>
        <input type="text" id="from" placeholder="City or Airport" required>
      </div>
      <div class="form-group">
        <label for="to">To</label>
        <input type="text" id="to" placeholder="City or Airport" required>
      </div>
      <div class="form-group">
        <label for="depart">Departure</label>
        <input type="date" id="depart" required>
      </div>
      <div class="form-group">
        <label for="return">Return</label>
        <input type="date" id="return" required>
      </div>

      <!-- Hotel Search -->
      <div class="form-group">
        <label for="destination">Hotel Destination</label>
        <input type="text" id="destination" placeholder="Where to stay?" required>
      </div>
      <div class="form-group">
        <label for="checkin">Check-in</label>
        <input type="date" id="checkin" required>
      </div>
      <div class="form-group">
        <label for="checkout">Check-out</label>
        <input type="date" id="checkout" required>
      </div>
      <div class="form-group">
        <label for="guests">Guests</label>
        <input type="number" id="guests" placeholder="2" min="1" required>
      </div>

      <button type="submit" class="book-btn">Search Packages</button>
    </form>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Roomora.com | All Rights Reserved</p>
  </footer>

  <script src="javascript.js"></script>
</body>
</html>
