<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="logo.webp">
  <title>Famous Places - Roomora</title>
  <link rel="stylesheet" href="places.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">Roomora<span>.com</span></div>
    <nav class="menu">
      <a href="/home/index.html">Home</a>
      <a href="/hotel/hotel.html">Hotel</a>
      <a href="/resort/resort.html">Resort</a>
      <a href="/guest/guest.html">Guest House</a>
      <a href="/flights/flights.html">Flights</a>
      <a href="/vehicle/vehicle.html">Vehicles</a>
      <a href="/places/places.html">Famous Places</a>
    </nav>

    <nav>
      <ul>
        <div class="auth-buttons">
          <div class="profile-dropdown">
            <img src="/images/I1.jpeg" alt="Profile Icon" class="profile-icon">
            <div class="dropdown-content">
              <a href="/register/register.html">Register</a>
              <a href="/register/login.html">Login</a>
            </div>
          </div>
        </div>
      </ul>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="places-hero">
    <h1>Explore Famous Places</h1>
    <p>Discover breathtaking destinations around the world.</p>
  </section>

  <!-- Places Section -->
  <section class="places-list">
    <div id="placesContainer">
      <!-- Places will be dynamically generated here -->
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Roomora.com · All rights reserved.</p>
  </footer>

  <!-- Script -->
  <script>
const places = [
  // Delhi
  {city: "Delhi", name: "India Gate", img: "https://wallpaperaccess.com/full/4455652.jpg"},
  {city: "Delhi", name: "Red Fort", img: "https://wallpapercave.com/wp/wp10702801.jpg"},
  {city: "Delhi", name: "Qutub Minar", img: "https://ichef.bbci.co.uk/news/976/cpsprodpb/143BF/production/_124897828_gettyimages-541363304-170667a.jpg"},
  {city: "Delhi", name: "Lotus Temple", img: "https://assets.hongkiat.com/uploads/beautiful-india-photography/the-lotus-temple.jpg"},
  {city: "Delhi", name: "Jama Masjid", img: "https://www.agrashivtourandtravels.com/wp-content/uploads/2020/06/jama-1024x683.jpg"},
  {city: "Delhi", name: "Humayun's Tomb", img: "https://wallpaperaccess.com/full/9355029.jpg"},
  {city: "Delhi", name: "Raj Ghat", img: "images/india/delhi/raj_ghat.jpg"},
  {city: "Delhi", name: "Chandni Chowk", img: "images/india/delhi/chandni_chowk.jpg"},
  {city: "Delhi", name: "Garden of Five Senses", img: "images/india/delhi/lotus_fountain.jpg"},
  {city: "Delhi", name: "Palika Bazaar", img: "images/india/delhi/palika_bazaar.jpg"},

  // Jaipur
  {city: "Jaipur", name: "Hawa Mahal", img: "images/india/jaipur/hawa_mahal.jpg"},
  {city: "Jaipur", name: "Amber Fort", img: "images/india/jaipur/amber_fort.jpg"},
  {city: "Jaipur", name: "Jantar Mantar", img: "images/india/jaipur/jantar_mantar.jpg"},
  {city: "Jaipur", name: "City Palace", img: "images/india/jaipur/siti_fort.jpg"},
  {city: "Jaipur", name: "Jal Mahal", img: "images/india/jaipur/jal_mahal.jpg"},
  {city: "Jaipur", name: "Nahargarh Fort", img: "images/india/jaipur/nahargarh_fort.jpg"},
  {city: "Jaipur", name: "Birla Mandir", img: "images/india/jaipur/birla_temple.jpg"},
  {city: "Jaipur", name: "Galta Ji", img: "images/india/jaipur/galta_ji.jpg"},
  {city: "Jaipur", name: "Albert Hall Museum", img: "images/india/jaipur/central_museum.jpg"},
  {city: "Jaipur", name: "Ram Niwas Garden", img: "images/india/jaipur/ram_niwas_garden.jpg"},

  // Agra
  {city: "Agra", name: "Taj Mahal", img: "images/india/agra/taj_mahal.jpg"},
  {city: "Agra", name: "Agra Fort", img: "images/india/agra/agra_fort.jpg"},
  {city: "Agra", name: "Fatehpur Sikri", img: "images/india/agra/fatehpur_sikri.jpg"},
  {city: "Agra", name: "Itmad-ud-Daulah", img: "images/india/agra/itz_kahna.jpg"},
  {city: "Agra", name: "Mehtab Bagh", img: "images/india/agra/mehtab_bagh.jpg"},
  {city: "Agra", name: "Akbar's Tomb", img: "images/india/agra/akbar_tomb.jpg"},
  {city: "Agra", name: "Jama Masjid", img: "images/india/agra/jama_masjid_agra.jpg"},
  {city: "Agra", name: "Mariam's Tomb", img: "images/india/agra/mariam_tomb.jpg"},
  {city: "Agra", name: "Sikandra Fort", img: "images/india/agra/sikandra_fort.jpg"},
  {city: "Agra", name: "Ram Bagh", img: "images/india/agra/ram_bagh.jpg"},

  // (Continue the same for Varanasi, Mumbai, Kolkata, Chennai, Bangalore)
];

// Group by city
const groupedPlaces = places.reduce((acc, place) => {
  if (!acc[place.city]) acc[place.city] = [];
  acc[place.city].push(place);
  return acc;
}, {});

const container = document.getElementById("placesContainer");

// Generate HTML per city
for (const city in groupedPlaces) {
  const cityTitle = document.createElement("h2");
  cityTitle.textContent = city;
  cityTitle.style.color = "#004aad";
  cityTitle.style.margin = "30px 0 15px 0";
  container.appendChild(cityTitle);

  const cityContainer = document.createElement("div");
  cityContainer.classList.add("city-section");

  groupedPlaces[city].forEach(place => {
    const card = document.createElement("div");
    card.classList.add("card");
    card.innerHTML = `
      <img src="${place.img}" alt="${place.name}" loading="lazy">
      <h3>${place.name}</h3>
      <p>${place.city}</p>
      <button class="explore-btn">Explore</button>
    `;
    cityContainer.appendChild(card);
  });

  container.appendChild(cityContainer);
}

// Explore button click
document.querySelectorAll(".explore-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    alert("Exploration details coming soon!");
  });
});
  </script>

</body>
</html>
